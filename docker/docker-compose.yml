version: '3.9'

services:
  # Icecast
  icecast:
    image: ghcr.io/microtronics/icecast:2.4.4
    container_name: icecast
    ports:
      - '8000:8000'
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_PASS:-hackme}
      ICECAST_RELAY_PASSWORD: ${ICECAST_RELAY_PASS:-hackme}
      ICECAST_ADMIN_USER: ${ICECAST_ADMIN_USER:-admin}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASS:-admin}
      ICECAST_HOSTNAME: ${ICECAST_HOST:-localhost}
    volumes:
      - ./icecast.xml:/etc/icecast2/icecast.xml:ro
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Redis UI — RedisInsight
  redis-ui:
    image: redis/redisinsight:latest
    container_name: redis-ui
    ports:
      - '5540:5540'
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'        # external (host access)
      - '29092:29092'      # internal (container-to-container)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:SASL_PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # SASL on external listener
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_EXTERNAL_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_OPTS: >-
        -Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
    restart: unless-stopped

  # Kafka UI — Kafka-UI (provectus)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - '8080:8080'
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
    restart: unless-stopped

  # Your NestJS App
  app:
    build: .
    container_name: radio-app
    depends_on:
      - redis
      - kafka
      - icecast
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_USERNAME: ${KAFKA_USERNAME:-app}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-app-secret}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-radio-service}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-radio-group}
      ICECAST_HOST: icecast
      ICECAST_PORT: 8000
      ICECAST_MOUNT: ${ICECAST_MOUNT:-/stream}
      ICECAST_USER: ${ICECAST_USER:-source}
      ICECAST_PASS: ${ICECAST_PASS:-hackme}
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  redis_data:
  redisinsight_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log: